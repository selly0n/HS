<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>행성고등학교</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f172a; /* 딥 네이비 */
  font-family: 'Arial', sans-serif;
  color: white;
}

/* 중앙 컨테이너 */
.container {
  text-align: center;
}

/* 제목 */
.title {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* 부제목 */
.subtitle {
  font-size: 16px;
  color: #94a3b8;
  margin-top: 10px;
  letter-spacing: 4px;
}

/* 버튼 */
button {
  margin-top: 40px;
  padding: 15px 40px;
  font-size: 16px;
  border: 1px solid white;
  background: transparent;
  color: white;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.3s;
}

/* 버튼 호버 */
button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">행성고등학교</div>
  <div class="subtitle">PLANET HIGH SCHOOL</div>

  <button onclick="location.href='student.html'">
    생활기록부 열람
  </button>
</div>

</body>
</html>
