<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행성고등학교</title>
  
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
}

/* 화면 공통 */
.screen {
  display: none;
  min-height: 100vh;
  padding: 40px 20px;
  box-sizing: border-box;
}
  
/* 보이는 화면 */
  .active {
  display: flex;
  align-items: center;
  flex-direction: column;
}

#main.active {
  justify-content: center;
}

#student.active,
#record.active {
  justify-content: flex-start;
}
  
/* 메인 */
.title {
  font-size: 48px;
  font-weight: bold;
}

.subtitle {
  margin-top: 10px;
  color: #94a3b8;
  letter-spacing: 4px;
}

button {
  margin-top: 40px;
  padding: 15px 40px;
  border: 1px solid white;
  background: transparent;
  color: white;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: white;
  color: black;
}

/* 학생 목록 */
.student-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  margin: 15px;
  text-align: center;
  cursor: pointer;
}

.card img {
  width: 120px;
  border-radius: 10px;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.1);
}

.name {
  margin-top: 8px;
}

#recordImg {
  transition: transform 0.2s;
  cursor: zoom-in;
}
</style>
</head>

<body>

<!-- 메인 화면 -->
<div id="main" class="screen active">
  <div class="title">행성고등학교</div>
  <div class="subtitle">PLANET HIGH SCHOOL</div>

  <button onclick="goStudent()">생활기록부 열람</button>
</div>

<!-- 학생 목록 -->
<div id="student" class="screen">
  <h2>학생 목록</h2>

  <div class="student-list">

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/지유R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/지유.png">
      <div class="name">공지유</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/다빈R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/다빈.png">
      <div class="name">모다빈</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/도윤R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/도윤.png">
      <div class="name">반도윤</div>
    </div>

     <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/우찬R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/우찬.png">
      <div class="name">백우찬</div>
    </div>

     <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/유담R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/유담.png">
      <div class="name">서유담</div>
    </div>

     <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/제우R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/제우.png">
      <div class="name">연제우</div>
    </div>

  </div>

  <button onclick="goMain()">뒤로가기</button>
</div>

<!-- 생활기록부 -->
<div id="record" class="screen">
  <h2>생활기록부</h2>
  <img id="recordImg" src="" width="400">
  <br>
  <button onclick="goStudent()">뒤로가기</button>
</div>

<script>
function changeScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function goStudent() {
  changeScreen('student');
}

function goMain() {
  changeScreen('main');
}

function showRecord(img) {
  document.getElementById('recordImg').src = img;
  changeScreen('record');
}

let scale = 1;

document.getElementById('recordImg').addEventListener('wheel', function(e) {
  e.preventDefault();

  if (e.deltaY < 0) {
    scale += 0.1; // 확대
  } else {
    scale -= 0.1; // 축소
  }

  // 최소/최대 제한
  if (scale < 0.5) scale = 0.5;
  if (scale > 3) scale = 3;

  this.style.transform = `scale(${scale})`;
});
</script>

</body>
</html>
