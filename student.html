<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행성고등학교</title>
  
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
}

/* 화면 공통 */
.screen {
  display: none;
  min-height: 100vh;
  padding: 40px 20px;
  box-sizing: border-box;
}
  
/* 보이는 화면 */
.active {
  display: flex;
  align-items: center;
  flex-direction: column;
}

#main.active {
  justify-content: center;
}

#student.active,
#record.active {
  justify-content: flex-start;
}
  
/* 메인 */
.title {
  font-size: 48px;
  font-weight: bold;
}

.subtitle {
  margin-top: 10px;
  color: #94a3b8;
  letter-spacing: 4px;
}

button {
  margin-top: 40px;
  padding: 15px 40px;
  border: 1px solid white;
  background: transparent;
  color: white;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: white;
  color: black;
}

/* 학생 목록 */
.student-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  margin: 15px;
  text-align: center;
  cursor: pointer;
}

.card img {
  width: 120px;
  border-radius: 10px;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.1);
}

.name {
  margin-top: 8px;
}

/* 🔥 생기부 이미지 */
.record-container {
  overflow: hidden;
  max-width: 90vw;
  max-height: 70vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#recordImg {
  max-width: 100%;
  max-height: 100%;
  transition: transform 0.2s;
  cursor: grab;

  /* 🔥 핵심 (드래그 버그 해결) */
  user-select: none;
  -webkit-user-drag: none;
}
</style>
</head>

<body>

<div id="main" class="screen active">
  <div class="title">행성고등학교</div>
  <div class="subtitle">PLANET HIGH SCHOOL</div>
  <button onclick="goStudent()">생활기록부 열람</button>
</div>

<div id="student" class="screen">
  <h2>학생 목록</h2>

  <div class="student-list">
    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/지유R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/지유.png">
      <div class="name">공지유</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/다빈R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/다빈.png">
      <div class="name">모다빈</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/도윤R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/도윤.png">
      <div class="name">반도윤</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/우찬R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/우찬.png">
      <div class="name">백우찬</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/유담R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/유담.png">
      <div class="name">서유담</div>
    </div>

    <div class="card" onclick="showRecord('https://raw.githubusercontent.com/selly0n/HS/main/S/제우R.png')">
      <img src="https://raw.githubusercontent.com/selly0n/HS/main/S/제우.png">
      <div class="name">연제우</div>
    </div>
  </div>

  <button onclick="goMain()">뒤로가기</button>
</div>

<div id="record" class="screen">
  <h2>생활기록부</h2>

  <div class="record-container">
    <img id="recordImg" src="" draggable="false">
  </div>

  <button onclick="goStudent()">뒤로가기</button>
</div>

<script>
function changeScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function goStudent() {
  changeScreen('student');
}

function goMain() {
  changeScreen('main');
}

document.addEventListener("DOMContentLoaded", function() {

  let scale = 1;
  let isDragging = false;
  let startX = 0, startY = 0;
  let translateX = 0, translateY = 0;

  const img = document.getElementById('recordImg');

  function updateTransform() {
    img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  }

  window.showRecord = function(imgSrc) {
    scale = 1;
    translateX = 0;
    translateY = 0;

    img.style.transform = 'translate(0,0) scale(1)';
    img.src = imgSrc;

    changeScreen('record');
  };

  // 확대/축소
  img.addEventListener('wheel', function(e) {
    e.preventDefault();

    if (e.deltaY < 0) scale += 0.1;
    else scale -= 0.1;

    if (scale < 1) scale = 1;
    if (scale > 3) scale = 3;

    updateTransform();
  });

  // 드래그 시작
  img.addEventListener('mousedown', (e) => {
    e.preventDefault();
    isDragging = true;

    startX = e.clientX - translateX;
    startY = e.clientY - translateY;

    img.style.cursor = 'grabbing';
  });

  // 드래그 이동
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    translateX = e.clientX - startX;
    translateY = e.clientY - startY;

    updateTransform();
  });

  // 드래그 종료
  document.addEventListener('mouseup', () => {
    isDragging = false;
    img.style.cursor = 'grab';
  });

});
</script>

</body>
</html>
