<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>행성고등학교</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* 공통 */
.hidden { display: none; }

/* 중앙 정렬 */
.center {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 메인 */
.title {
  font-size: 48px;
  font-weight: bold;
}

.subtitle {
  margin-top: 10px;
  color: #94a3b8;
  letter-spacing: 4px;
}

button {
  margin-top: 30px;
  padding: 15px 40px;
  border: 1px solid white;
  background: transparent;
  color: white;
  border-radius: 999px;
  cursor: pointer;
}

/* 학생 */
.student-list img {
  width: 120px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.student-list img:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- 메인 -->
<div id="main" class="center">
  <div class="title">행성고등학교</div>
  <div class="subtitle">PLANET HIGH SCHOOL</div>
  <button onclick="show('student')">생활기록부 열람</button>
</div>

<!-- 학생 목록 -->
<div id="student" class="hidden">
  <h2>학생 목록</h2>

  <div class="student-list">
    <img src="학생1.png" onclick="showRecord('record1.png')">
    <img src="학생2.png" onclick="showRecord('record2.png')">
    <img src="학생3.png" onclick="showRecord('record3.png')">
  </div>

  <button onclick="show('main')">뒤로가기</button>
</div>

<!-- 생기부 -->
<div id="record" class="hidden">
  <h2>생활기록부</h2>
  <img id="recordImg" src="" width="400">
  <br>
  <button onclick="show('student')">뒤로가기</button>
</div>

<script>
function show(id) {
  document.querySelectorAll('body > div').forEach(div => {
    div.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function showRecord(img) {
  show('record');
  document.getElementById('recordImg').src = img;
}
</script>

</body>
</html>
