<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>캐릭터 프로필</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .name {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }

    .info {
      margin-top: 10px;
      line-height: 1.6;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <img src="이미지링크">
  <div class="name">캐릭터 이름</div>

  <div class="info">
    나이: 17<br>
    성격: 냉정, 무뚝뚝<br>
    특징: 학생회장
  </div>

  <button onclick="alert('추가 정보!')">더보기</button>
</div>

</body>
</html>
